<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Under Maintenance — Lumière</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="maintenance-page">
  <div class="container">
    <div class="maint-content">
      <div style="margin-bottom:28px">
        <span class="logo-main" style="font-family:var(--font-heading);font-size:2.2rem;font-weight:700;color:#fff">Lumière</span>
        <span class="logo-sub" style="display:block;font-size:0.58rem;letter-spacing:0.32em;text-transform:uppercase;color:var(--accent);margin-top:4px">Interiors & Architecture</span>
      </div>
      <span class="section-label">We'll Be Back Soon</span>
      <h2>We're Refreshing Our Space</h2>
      <p style="color:rgba(255,255,255,0.6);font-size:1.05rem;max-width:460px;margin:0 auto 10px;line-height:1.75">Our website is currently undergoing scheduled maintenance. We're making improvements to serve you better.</p>
      <div class="countdown" id="countdown" data-target="2026-05-01T00:00:00">
        <div class="count-item"><div class="cnum" id="days">00</div><div class="clbl">Days</div></div>
        <div class="count-item"><div class="cnum" id="hours">00</div><div class="clbl">Hours</div></div>
        <div class="count-item"><div class="cnum" id="minutes">00</div><div class="clbl">Minutes</div></div>
        <div class="count-item"><div class="cnum" id="seconds">00</div><div class="clbl">Seconds</div></div>
      </div>
      <p style="color:rgba(255,255,255,0.45);font-size:0.88rem;margin-bottom:28px">In the meantime, reach us at <a href="mailto:hello@lumiere-interiors.com" style="color:var(--accent)">hello@lumiere-interiors.com</a></p>
      <div style="display:flex;gap:28px;justify-content:center;">
        <div class="footer-newsletter" style="max-width:380px;width:100%">
          <input type="email" placeholder="Get notified when we're back"/>
          <button type="button">Notify Me</button>
        </div>
      </div>
      <div class="footer-social" style="justify-content:center;margin-top:32px">
        <a href="#"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/></svg></a>
        <a href="#"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg></a>
      </div>
    </div>
  </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
